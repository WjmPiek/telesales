{% extends 'base.html' %}{% block content %}<h2>New communication campaign</h2><form method="post" class="card"><div class="card-body"><div class="mb-3"><label class="form-label">Campaign name</label><input class="form-control" name="name" required></div><div class="mb-3"><label class="form-label">Email subject</label><input class="form-control" name="subject" value="Would you like us to call you about funeral cover?"></div><div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" rows="7" name="message_body" required>During difficult times, the right funeral cover can help protect your family from unexpected expenses. Would you like one of our consultants to contact you about an affordable funeral policy?</textarea></div><div class="form-check"><input class="form-check-input" type="checkbox" name="send_whatsapp" checked id="wa"><label class="form-check-label" for="wa">Send WhatsApp</label></div><div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="send_email" checked id="em"><label class="form-check-label" for="em">Send email</label></div><button class="btn btn-primary">Create campaign</button></div></form>{% endblock %}
