{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between mb-3"><h2>Notifications</h2><form method="post" action="{{ url_for('communications.read_all_notifications') }}"><button class="btn btn-outline-secondary">Mark all read</button></form></div><div class="card"><div class="list-group list-group-flush">{% for item in items %}<div class="list-group-item {% if not item.is_read %}fw-bold{% endif %}"><div class="d-flex justify-content-between"><div><div>{{ item.title }}</div><div class="small text-muted">{{ item.message }}</div><div class="small text-muted">{{ item.created_at.strftime('%Y-%m-%d %H:%M') }}</div></div>{% if not item.is_read %}<form method="post" action="{{ url_for('communications.read_notification', notification_id=item.id) }}"><button class="btn btn-sm btn-primary">Open</button></form>{% endif %}</div></div>{% else %}<div class="list-group-item">No notifications.</div>{% endfor %}</div></div>{% endblock %}
